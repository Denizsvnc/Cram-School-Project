version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-cramschool}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crampassword}
      POSTGRES_DB: ${DB_NAME:-dershane}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-cramschool}:${DB_PASSWORD:-crampassword}@db:5432/${DB_NAME:-dershane}?schema=public
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - FRONTEND_ORIGINS=*
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
